<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <title>Snake Game</title>
    <link rel="stylesheet" href="snake.css">
    <script src="snake2.js" defer></script> <!-- run the script after it has run everything else in the html which helps avoid errors -->
</head>
<body>
    <div class="scores">
        <h1 id="scoreText">000</h1>
        <h2 id="highScore">000</h2> 
    </div>
    <div class="game-border-1">
        <div class="game-border-2">
            <div class="game-border-3">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
            </div>
        </div>
    </div> 
    <div class="controls">
        <button id="startBtn">Start</button>
        <button id="pausBtn">Pause</button>
    </div>
</body>
</html>
